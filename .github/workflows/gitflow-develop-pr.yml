name: "Auto PR: develop to master"
on:
  push:
    branches:
      - develop
jobs:
  auto-pr:
    name: develop to master
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: master
          branch: develop
          title: "chore: merge develop into master"
          body: "Automated PR to merge the latest develop changes into master."
          delete-branch: false
