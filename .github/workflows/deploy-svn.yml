name: Deploy to WordPress.org SVN

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. 1.2.0)'
        required: true

jobs:
  deploy:
    name: Deploy to WordPress.org SVN
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref_name }}
          fetch-depth: 0

      - name: Install SVN
        run: sudo apt-get update && sudo apt-get install -y subversion

      - name: Deploy to WordPress.org SVN
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SLUG: ct-optimization
          VERSION: ${{ github.event_name == 'release' && github.event.release.tag_name || github.event.inputs.version }}
        run: |
          set -euo pipefail

          SVN_URL="https://plugins.svn.wordpress.org/${SLUG}/"
          SVN_DIR="${HOME}/svn-${SLUG}"

          echo "Checking out ${SVN_URL}"
          svn checkout --depth immediates "$SVN_URL" "$SVN_DIR"
          cd "$SVN_DIR"

          svn update --set-depth infinity trunk

          if svn ls "${SVN_URL}tags/${VERSION}" >/dev/null 2>&1; then
            echo "Version ${VERSION} already exists in SVN; skipping deploy."
            exit 0
          fi

          echo "Syncing repository contents to trunk"
          rsync -rc --delete --delete-excluded \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.gitignore' \
            --exclude '.editorconfig' \
            --exclude '.DS_Store' \
            "$GITHUB_WORKSPACE/" trunk/

          svn add . --force > /dev/null
          svn status | grep '^\!' | sed 's/! *//' | xargs -r -I% svn rm % > /dev/null

          echo "Committing to SVN"
          svn commit -m "Update to version ${VERSION} from GitHub" \
            --no-auth-cache --non-interactive \
            --username "$SVN_USERNAME" --password "$SVN_PASSWORD"

          echo "Creating tag ${VERSION}"
          svn copy "${SVN_URL}trunk" "${SVN_URL}tags/${VERSION}" \
            -m "Tag version ${VERSION}" \
            --no-auth-cache --non-interactive \
            --username "$SVN_USERNAME" --password "$SVN_PASSWORD"
