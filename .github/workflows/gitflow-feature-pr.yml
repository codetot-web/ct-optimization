name: "Auto PR: feature to develop"
on:
  push:
    branches:
      - 'feature/**'
jobs:
  auto-pr:
    name: feature to develop
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: develop
          branch: ${{ github.ref_name }}
          title: "feat: merge ${{ github.ref_name }} into develop"
          body: "Automated PR to merge feature branch into develop."
          delete-branch: false
